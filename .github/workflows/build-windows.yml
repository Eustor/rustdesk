name: Build Windows - VersÃµes Customizadas

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'VersÃ£o do build (ex: 1.0.0)'
        required: true
        default: '1.0.0'
      build_target:
        description: 'Qual versÃ£o compilar'
        required: true
        type: choice
        options:
          - todas
          - tecnico
          - go-system
          - origem
          - host
          - cdl

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          if [ "$TARGET" = "todas" ]; then
            echo 'matrix=["tecnico","go-system","origem","host","cdl"]' >> $GITHUB_OUTPUT
          else
            echo "matrix=[\"$TARGET\"]" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout RustDesk
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout build configs
        uses: actions/checkout@v4
        with:
          repository: Eustor/ferramenta-acesso-remoto
          path: build-configs
          token: ${{ secrets.BUILD_REPO_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Aplicar patches de customizaÃ§Ã£o
        run: python build-configs/build/apply_patches.py build-configs/build/configs/${{ matrix.config }}.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verificar LLVM
        run: |
          if (Get-Command clang -ErrorAction SilentlyContinue) {
            Write-Host "LLVM jÃ¡ instalado: $(clang --version)"
          } else {
            choco install llvm -y
          }

      - name: Instalar dependÃªncias vcpkg (x64-windows-static)
        run: |
          C:\vcpkg\vcpkg install `
            opus:x64-windows-static `
            libvpx:x64-windows-static `
            libyuv:x64-windows-static `
            aom:x64-windows-static `
            --classic
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Instalar dependÃªncias Python do build
        run: pip install toml

      - name: Ativar ffigen (requerido pelo flutter_rust_bridge_codegen)
        run: |
          dart pub global activate ffigen 5.0.1
          echo "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Instalar flutter_rust_bridge_codegen
        run: |
          $lock = Get-Content Cargo.lock -Raw
          if ($lock -match 'name = "flutter_rust_bridge"\r?\nversion = "([^"]+)"') {
            $fbVersion = $Matches[1]
            Write-Host "Instalando flutter_rust_bridge_codegen v$fbVersion (do Cargo.lock)"
          } else {
            $fbVersion = "1.82.6"
            Write-Host "AVISO: versÃ£o nÃ£o encontrada no Cargo.lock, usando $fbVersion"
          }
          cargo install flutter_rust_bridge_codegen --version $fbVersion

      - name: Flutter pub get (necessÃ¡rio antes do codegen)
        working-directory: flutter
        run: flutter pub get

      - name: Gerar generated_bridge.dart
        run: |
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart
          # Corrigir assinatura de tipo Bool â†’ Uint8 (compatibilidade ffigen)
          $f = "flutter/lib/generated_bridge.dart"
          (Get-Content $f -Raw) `
            -replace 'ffi\.NativeFunction<ffi\.Bool Function\(DartPort', `
                     'ffi.NativeFunction<ffi.Uint8 Function(DartPort' |
            Set-Content $f

      - name: Build Rust lib (compila DLL)
        run: cargo build --features flutter --lib --release
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Flutter build Windows
        working-directory: flutter
        run: flutter build windows --release

      - name: Gerar portable (zip com exe + DLLs + data)
        run: |
          $config = Get-Content "build-configs/build/configs/${{ matrix.config }}.json" | ConvertFrom-Json
          $appName = $config.app_name -replace ' ', '-'
          $version = "${{ github.event.inputs.version }}"

          # Localizar pasta do Flutter build
          $out = "flutter\build\windows\x64\runner\Release"
          if (-not (Test-Path $out)) { $out = "flutter\build\windows\runner\Release" }
          if (-not (Test-Path $out)) { Write-Error "Flutter build output nao encontrado"; exit 1 }

          # Criar pasta temporÃ¡ria com o nome do app
          $portableDir = "dist\$appName"
          New-Item -ItemType Directory -Force -Path $portableDir
          Copy-Item "$out\*" $portableDir -Recurse -Force

          # Renomear o executÃ¡vel principal
          if (Test-Path "$portableDir\rustdesk.exe") {
            Rename-Item "$portableDir\rustdesk.exe" "$appName.exe"
          }

          # Listar conteÃºdo para debug
          Write-Host "Conteudo do portable:"
          Get-ChildItem $portableDir -Recurse | Select-Object FullName

          # Compactar tudo em zip
          $zipPath = "dist\$appName-$version-portable.zip"
          Compress-Archive -Path "$portableDir\*" -DestinationPath $zipPath
          Write-Host "ZIP criado: $zipPath ($('{0:N1}' -f ((Get-Item $zipPath).Length / 1MB)) MB)"

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}-v${{ github.event.inputs.version }}
          path: dist/*-portable.zip
          retention-days: 30
